{% extends "store/base.html" %}
{% block title %}Login – {{ site_settings.site_name|default:"Artist Store" }}{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4" style="background: var(--theme-bg);">
    <div class="w-full max-w-sm rounded-xl p-6" style="background: var(--theme-bg-card); border: 1px solid var(--theme-border);">
        <h1 class="text-xl font-bold mb-4" style="color: var(--theme-text);">Login</h1>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if form.errors %}
                <p class="text-sm mb-3" style="color: var(--theme-accent);">Invalid username or password.</p>
            {% endif %}
            <div class="space-y-3">
                <div>
                    <label for="id_username" class="block text-sm font-medium mb-1" style="color: var(--theme-text);">Username</label>
                    <input type="text" name="username" id="id_username" required autofocus class="w-full px-3 py-2 rounded-lg border text-sm" style="background: var(--theme-bg); border-color: var(--theme-border); color: var(--theme-text);">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium mb-1" style="color: var(--theme-text);">Password</label>
                    <input type="password" name="password" id="id_password" required class="w-full px-3 py-2 rounded-lg border text-sm" style="background: var(--theme-bg); border-color: var(--theme-border); color: var(--theme-text);">
                </div>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="w-full mt-4 py-2 rounded-lg font-medium text-sm" style="background: var(--theme-accent); color: white;">Log in</button>
        </form>
        <a href="{% url 'index' %}" class="block mt-4 text-sm text-center" style="color: var(--theme-text-muted);">← Back to store</a>
    </div>
</div>
{% endblock %}
