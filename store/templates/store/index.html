<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Store</title>
</head>
<body>
    <h1>Available Artworks</h1>
    {% if artworks %}
        <ul>
            {% for art in artworks %}
            <li>
                <h2>{{ art.title }}</h2>
                {% if art.image %}
                    <img src="{{ art.image.url }}" alt="{{ art.title }}" width="200">
                {% endif %}
                <p>{{ art.description }}</p>
                <p>Price: ${{ art.price }}</p>
                <p>Artist: {{ art.artist.name }}</p>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No artworks available at this time.</p>
    {% endif %}
</body>
</html>
