<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artist Store{% endblock %}</title>
    {% load static %}
    <link href="{% static 'store/css/themes.css' %}" rel="stylesheet">
    <link href="{% static 'store/css/output.css' %}" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col md:flex-row" style="background: var(--theme-bg, #f5f0e8); color: var(--theme-text, #3d3730);">
    {# Mobile header with hamburger #}
    <header class="md:hidden flex items-center justify-between px-4 py-3 shrink-0 border-b" style="background: var(--theme-bg-header); border-color: var(--theme-border);">
        <span class="font-semibold" style="color: var(--theme-text);">{{ site_settings.site_name|default:"Artist Store" }}</span>
        <button type="button" id="sidebar-toggle" class="p-2 rounded-lg touch-manipulation" style="color: var(--theme-text); -webkit-tap-highlight-color: transparent;" aria-label="Toggle menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
    </header>
    {# Sidebar: hidden on mobile, shown via JS; always visible on md+ #}
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 -translate-x-full md:translate-x-0 md:relative md:inset-auto shrink-0 border-r flex flex-col transition-transform duration-200 ease-out md:flex" style="background: var(--theme-bg-header); border-color: var(--theme-border); top: 0; padding-top: env(safe-area-inset-top, 0);">
        <div class="md:hidden flex justify-end p-2">
            <button type="button" id="sidebar-close" class="p-2 rounded-lg" style="color: var(--theme-text);" aria-label="Close menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        {% include "store/components/organisms/nav_bar.html" %}
    </aside>
    <div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-black/40 hidden md:hidden" aria-hidden="true"></div>
    <main class="flex-1 min-w-0 overflow-auto w-full">
        {% block content %}{% endblock %}
    </main>
    <script>
      (function() {
        var saved = localStorage.getItem('artist-store-theme');
        var defaultTheme = '{{ site_settings.default_theme|default:"cute-beige" }}';
        document.documentElement.setAttribute('data-theme', saved || defaultTheme);
      })();
      (function() {
        var sidebar = document.getElementById('sidebar');
        var toggle = document.getElementById('sidebar-toggle');
        var closeBtn = document.getElementById('sidebar-close');
        var backdrop = document.getElementById('sidebar-backdrop');
        if (!sidebar || !toggle) return;
        function openSidebar() {
          sidebar.classList.remove('-translate-x-full');
          if (backdrop) backdrop.classList.remove('hidden');
          document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
          sidebar.classList.add('-translate-x-full');
          if (backdrop) backdrop.classList.add('hidden');
          document.body.style.overflow = '';
        }
        toggle.addEventListener('click', openSidebar);
        if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
        if (backdrop) backdrop.addEventListener('click', closeSidebar);
      })();
    </script>
</body>
</html>
